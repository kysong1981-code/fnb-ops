version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fnb_ops_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fnb_ops_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fnb_ops_backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,oneops.co.nz,3.27.246.211
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,https://oneops.co.nz
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=fnb_ops_db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_HOST=db
      - DB_PORT=3306
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fnb_ops_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api

volumes:
  mysql_data:
